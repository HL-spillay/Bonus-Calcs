# Bonus engine policy — extracted from Managers criteria & Store Staff Criteria
# (Audit xlsx, cycle 2026-05). See docs/bonus-model-logic.md.

attendance:
  gate_pct: 0.80          # primary-job days ≥ 80% to earn anything
  employee_count_gate_pct: 0.80  # Employees info headcount filter

payout_floors:
  per_person_minimum: 50  # store & manager incentive floor (Rand)

cluster_manager:
  share: 0.30             # 30% of manager bonus % per managed store

store_bonus:
  pool_pct: 0.10          # 10% of sales above target
  weighting:
    default:              # RSA, Zam, Nam, Swaz, Les (Store Staff Criteria B4-B6)
      guaranteed: 0.0
      oil_shrink: 0.0
      shrink_ex_oil: 1.0
    angola:               # Store Staff Criteria C4-C6
      guaranteed: 0.70
      oil_shrink: 0.0
      shrink_ex_oil: 0.30
  angola_qualification: sales_target_only  # else: sales_target AND shrink_ex_oil PASS

oil_shrink_thresholds:    # Store Staff Criteria rows 17-22 (strictly greater than)
  EXTRA-LARGE: 0.0065
  LARGE: -0.0835
  MEDIUM: -0.196
  MEDIUM-LARGE: -0.1514
  MEDIUM-SMALL: -0.2175
  SMALL: -0.3677

shrink_ex_oil_limits:     # Store Staff Criteria rows 29-36 (variance % of sales, between limits)
  South Africa: { upper: 0.06, lower: 0.0 }
  Lesotho: { upper: 0.06, lower: 0.0 }
  Eswatini: { upper: 0.06, lower: 0.0 }
  Zambia: { upper: 0.06, lower: 0.0 }
  Namibia: { upper: 0.06, lower: 0.0 }
  Angola: { upper: 0.0075, lower: -0.0075 }
  Mauritius: { upper: 0.06, lower: 0.0 }
  Zimbabwe: { upper: 0.06, lower: 0.0 }

oil_quality:
  tpm_max_pct: 0.05       # ≤ 5% TPM readings over 25
  checklist_min: 0.895    # Co-Pilot checklist ≥ 89.5%
  stock_take_min: 0.895   # stock-take ≥ 89.5%
  sub_check_weight: 0.03  # each sub-check worth 3%
  all_pass_weight: 0.10   # all three → 10%

delivery:
  online_rate_min: 0.90
  availability_min: 0.985
  acceptance_max: 1.0
  cancellations_max: 0.001

virtual_assistant:
  thaw_plan_min: 0.85
  drop_plan_min: 0.85
  avg_response_max: 2.0
  excluded_countries: [Angola, Eswatini, Mauritius, Zimbabwe]

banking:
  rsa_zim_mau_angola_pass_value: Compliant
  zambia_pass_value: Incentive Payout

drop_validation:
  score_threshold: 0.745  # valid drop score < 0.745 → 100% impact (penalty)

kpi_exclusions:
  labour_excluded_countries: [Angola]
  oil_quality_excluded_countries: [Angola]
  virtual_assistant_excluded_countries: [Angola, Eswatini, Mauritius, Zimbabwe]
  overrider_excluded_countries: [Angola]
  manager_overrider_zero_countries: [Zimbabwe, Mauritius]

eligibility:
  exclude_status: [Closed, BOTSWANA FRANCHISE]
  lesotho_maps_to: South Africa
  entry_types: [Store, Manager]

